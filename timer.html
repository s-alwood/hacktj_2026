<html>
<head>
<title>Pomodoro Timer</title>
</head>

<body>

<audio id="myAudio" src="loud_alarm_sound.mp3" preload="auto"></audio>

<div id="time-left"></div>

<style>
#time-left {
  color: rgb(71, 26, 82);
  font-size: 24px;
  font-weight: bold;
}
</style>

<script>

let timerInterval = null;
let paused = false;

function do_next_interval(my_pomo){

    const time = document.getElementById("time-left");

    time.textContent = my_pomo.formatted_time();

    paused = false;

    timerInterval = setInterval(() => {

        if(paused) return;

        my_pomo.pass_time();
        time.textContent = my_pomo.formatted_time();

        if(my_pomo.time_left == 0){
            my_pomo.pass_time();
            clearInterval(timerInterval);
            timerInterval = null;
        }

    }, 10);
}

function pauseTimer(){
    paused = true;
}

function resumeTimer(){
    paused = false;
}

function playAudio() {
    var audio = document.getElementById("myAudio");
    audio.play();
}

class pomo_timer {
    constructor(work_time = 25, break_time = 5){
        this.work = work_time;
        this.break = break_time;
        this.iterations = 0;

        this.time_left = work_time * 60;
        this.working = true;
    }

    pass_time(){
        if(this.time_left == 0){

            playAudio();

            if(this.working){
                this.time_left = this.break * 60;
            }
            else{
                this.time_left = this.work * 60;
                this.iterations += 1;
            }

            this.working = !this.working;
        }
        else{
            this.time_left -= 1;
        }
    }

    formatted_time(){
        const minutes = Math.floor(this.time_left/60);
        const seconds = Math.floor(this.time_left % 60).toString().padStart(2, "0");
        return `${minutes}:${seconds}`;
    }
}

const my_pomo = new pomo_timer()

</script>

<button onclick="do_next_interval(my_pomo)">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resumeTimer()">Resume</button>

</body>
</html>
