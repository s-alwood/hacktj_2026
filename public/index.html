body {

.panel {

.panel-right {

}
.buttonRow {

.buttonRow button {

button {

}

.todoButton {

#circleArea{

    align-items:center;
    overflow:hidden;
}

#circle{
    width:150px;
    height:150px;

    justify-content:center;
    align-items:center;
}

@keyframes glowPulse {
    0% { box-shadow: var(--glow-small), var(--glow-medium); }
    50% { box-shadow: var(--glow-big), var(--glow-huge); }
    100% { box-shadow: var(--glow-small), var(--glow-medium); }
}



.gacha {
    position: absolute;
    top: 10px; /* Moves 10px down from its original position */
    right: 10px; /* No horizontal movement */
}

.gachaBigButton {
    margin-top:10px;
    padding:16px 32px;
    font-size:28px;
    font-family:"Chewy";

    border:none;
    border-radius:40px;

        #ffa32b 70%,

.inventory {

.littleButton {

.textButton {

.material-symbols-outlined {

    font-size: 32px;
    color: rgb(236, 252, 255); /* optional */
}

/* Button effects */
.littleButton:hover {
    background-color: #eaa04cdc;
    
}
button:hover {
    transform: scale(1.1);
}

button:active {
    opacity: 0.8;
}

/* Modal background */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;

    background-color: rgba(0, 0, 0, 0.37);

    display: flex;
    justify-content: center;
    align-items: center;

    opacity: 0;
    z-index: -1;
}

/* Modal visible */
.modal.open {
    opacity: 1;
    z-index: 999;
}


/* Modal box */
.modal-inner {
    position: relative;
    font-family: "Chewy";
    background-color: rgb(133, 133, 170);
    color: rgb(225, 225, 225); /* make text inside modal black */
    padding: 20px;
    border-radius: 10px;

    text-align: center;
    width: 50vw;      /* 75% of viewport width */
    height: 50vh;     /* 75% of viewport height */
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
}

/* Tab buttons container */
.modaltabs {
    display: flex;
    width:auto;
    padding:10px;
    margin-bottom: 20px;
}

/* Individual tab button: fills space, no outline */
.modaltab {

  flex: 1;               /* fills equal width */
  text-align: center;
  padding: 10px;
  background: rgb(133, 133, 170);      /* base color */
  color: white;
  cursor: pointer;
  outline: none;          /* remove default focus outline */
  border: none;
  user-select: white;
}

/* Darken color on hover/highlight */
.modaltab:hover {
  background: rgba(16, 16, 85, 0.137);;
}

.loginfield {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    border-radius: 8px 8px 0 0;
    background: #e0e0e0;
    font-weight: 600;
    cursor: pointer;
}

/* Input textboxes for login/signup */
.loginfield input {
    width: 70%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;

    font-family: "Chewy";
}
.loginfield button {
    font-family: "Potta One";
    width:50%;
    margin:8px 0;
    outline:none;

}

/* Back buttons for all modals */
.backbtn, .backbtn2, .backbtn3 {
    position: absolute; /* make it stick to top-left of modal */
    top: 10px;          /* 10px from the top */
    left: 10px;         /* 10px from the left */

    width: 45px;
    height: 45px;
    border-radius: 50%;
    background-color: #8997b8dc;
    border: none;

    display: flex;          /* centers the icon inside */
    align-items: center;    
    justify-content: center;
    cursor: pointer;

    font-size: 20px;
    color: white;
}

.backbtn:hover, .backbtn2:hover, .backbtn3:hover {
    transform: scale(1.1);
}


#xpContainer {

}

#xpBar {
    width: 0%;

}

#tokenDisplay{

#tokenIcon{

#skinCircle{

#titleText {

#taskInput {

#taskList {

li {
    padding: 10px;
    background-color: #e9e9e9;

li.completed {

.sparkle {
    position: fixed;
    width: 6px;
    height: 6px;

    background: radial-gradient(circle,
        rgba(255, 255, 255, 0.9) 0%,
        rgba(255, 198, 114, 0.836) 40%,
        rgba(255,255,255,0) 70%);

    border-radius: 50%;

    pointer-events: none;

    animation: sparkleFade 2s ease-out forwards;
}

@keyframes sparkleFade {
    0% {
        opacity: 0;
        transform: scale(0.3);
    }

    30% {
        opacity: 1;
        transform: scale(1);
    }

    100% {
        opacity: 0;
        transform: scale(0.3);
    }
}

/* Firefly wings */
.wing {
    position: absolute;
    width: 75%;
    height: 50%;
    top: -5%;
    background: rgba(255,255,255,0.45);
    border-radius: 50%;
    pointer-events: none;
    filter: blur(2px);
    z-index: -99;
}

/* left wing */
.wing-left {
    left: -35%;
    transform-origin: right center;
    animation: flapLeft 0.5s ease-in-out infinite alternate;
}

/* right wing */
.wing-right {
    right: -35%;
    transform-origin: left center;
    animation: flapRight 0.5s ease-in-out infinite alternate;
}

/* wing flapping animations */
@keyframes flapLeft {
    from { transform: rotate(35deg); }
    to   { transform: rotate(10deg); }
}

@keyframes flapRight {
    from { transform: rotate(-35deg); }
    to   { transform: rotate(-10deg); }
}

</style>

const loginHelperText = document.getElementById("loginHelperText");
// async pull json
async function signupUser() {
    const username = document.getElementById("signup-username").value;
    const password = document.getElementById("signup-password").value;

    const res = await fetch("/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    const msg = data.success ? "Signup successful!" : data.message;
    alert(msg);
    loginHelperText.innerText = msg;
    }

    async function loginUser() {
    const username = document.getElementById("login-username").value;
    const password = document.getElementById("login-password").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
        msg = "Login successful!";
        alert(msg);
        loginHelperText.innerText = msg;
        

        localStorage.setItem("user", JSON.stringify(data.user));
        document.getElementById("auth-panel").style.display = "none"; // hide panel
        // Show your Pomodoro app here
    } else {
        alert(data.message);
    }
}

const panels = { // button id : modalId
    settings: 'modal',       // Settings
    gacha: 'starmodal',       // Gacha
    inventory: 'inventorymodal', // Inventory
    login: "loginmodal"
};

for (const [buttonId, modalId] of Object.entries(panels)) {
    const btn = document.getElementById(buttonId);
    const modal = document.getElementById(modalId);

    // Open modal when button clicked
    btn.addEventListener('click', () => modal.classList.add('open'));

    // Find corresponding back button inside the modal
    const backBtn = modal.querySelector('button[id^="backbtn"]');
    backBtn.addEventListener('click', () => modal.classList.remove('open'));
}

// Close modals when clicking outside the modal-inner
document.querySelectorAll('.modal').forEach(modal => {
    modal.addEventListener('click', (e) => {
        // Only close if the click is on the background, not inside the panel
        if (!e.target.closest('.modal-inner')) {
            modal.classList.remove('open');
        }
    });
});

white 0%,

function updateUI() {

    });

    const total = Object.values(rarityCount).reduce((a,b)=>a+b,0);
    let startAngle = -Math.PI / 2;
    const slices = [];

    Object.keys(rarityCount).forEach(rarity => {
        const count = rarityCount[rarity];
        if(count === 0) return;

    function drawRarityPie() {
    const canvas = document.getElementById("rarityPie");
    const container = document.getElementById("pieContainer");
    const label = document.getElementById("pieLabel");
    const ctx = canvas.getContext("2d");

    const containerWidth = container.clientWidth;
    const containerHeight = container.clientHeight;
    const padding = 20; // padding around the chart

    // Perfect square minus padding
    const size = Math.min(containerWidth, containerHeight) - padding * 2;
    canvas.width = size + padding * 2;
    canvas.height = size + padding * 2;
    canvas.style.width = canvas.width + "px";
    canvas.style.height = canvas.height + "px";

    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const radius = size / 2;

    // Count rarities
    const rarityCount = { "Common":0, "Uncommon":0, "Rare":0, "Epic":0, "Legendary":0 };
    playerData.inventory.forEach(name => {
        const skin = skins.find(s => s.name === name);
        if(skin) rarityCount[skin.rarity]++;
    });
    const total = Object.values(rarityCount).reduce((a,b)=>a+b,0);

    let startAngle = -Math.PI/2;
    const slices = [];

    Object.keys(rarityCount).forEach(rarity=>{
        const count = rarityCount[rarity];
        if(count===0) return;
        const sliceAngle = (count/total)*2*Math.PI;
        slices.push({rarity, startAngle, endAngle: startAngle+sliceAngle});
        startAngle += sliceAngle;
    });

    function render(highlight=null){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        slices.forEach(slice=>{
            const mid = (slice.startAngle+slice.endAngle)/2;
            const r = (slice.rarity===highlight)? radius*1.1 : radius;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, r, slice.startAngle, slice.endAngle);
            ctx.closePath();
            ctx.fillStyle = rarityColors[slice.rarity]||"#000";
            ctx.fill();
        });
    }

    render();

    canvas.onmousemove = (e)=>{
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const x = mouseX - centerX;
        const y = mouseY - centerY;
        let angle = Math.atan2(y,x);
        if(angle<-Math.PI/2) angle+=2*Math.PI;

        let hovered = null;
        slices.forEach(slice=>{
            if(angle>=slice.startAngle && angle<=slice.endAngle) hovered = slice.rarity;
        });

        render(hovered);

        if(hovered){
            label.innerText = `${hovered}: ${rarityCount[hovered]}`;
            // Keep label inside container
            label.style.left = Math.min(mouseX + 10, canvas.width - 80) + "px";
            label.style.top = Math.max(mouseY - 20, 0) + "px";
            label.style.color = "navy";
        } else {
            label.innerText = "";
        }
    };

    canvas.onmouseleave = ()=>{render(); label.innerText="";}
}

class pomo_timer {
    constructor(work_time = 25, break_time = 5, long_break_time = 15){
        this.work = work_time;
        this.break = break_time;
        this.long_break = long_break_time
        this.iterations = 0;

        this.time_left = work_time * 60;
        this.working = true;
    }

    pass_time(){
        if(this.time_left == 0){

            playAudio();

            if(this.working){
                if(this.iterations % 3 == 2){
                    this.time_left = this.long_break * 60;
                }
                else{
                    this.time_left = this.break * 60;
                }
            }
            else{
                this.time_left = this.work * 60;
                this.iterations += 1;
            }

            this.working = !this.working;
        }
        else{
            this.time_left -= 1;
        }

    }

    formatted_time(){
        const minutes = Math.floor(this.time_left/60);
        const seconds = Math.floor(this.time_left % 60).toString().padStart(2, "0");
        return `${minutes}:${seconds}`;
    }

    stage(){
        if(self.working){
            return "Working";
        }
        else{
            return "Break";
        }
        
    }
}

    function addTask() {
        const taskText = taskInput.value.trim();

        if (taskText !== '') {
            // Create a new list item element

            // i want to somehow wrap the element into a javascript class
            const li = document.createElement('li');
            li.innerHTML = taskText; // Add the task text to the list item
            

            // Append the new list item to the unordered list
            taskList.appendChild(li);

            // Clear the input field after adding the task
            taskInput.value = '';

             // Add click listener to toggle completion
            li.addEventListener("click", function() {
                li.classList.toggle("completed");
                if(li.classList.contains('completed')){
                    playerData.tokens += 1
                }
                else{
                    playerData.tokens -= 1
                }
                updateUI();
                token_disp.textContent = playerData.tokens
                // add to some sort of tracker of tasks completed during a pomo
            });

            function handleKeydown(event) {
            if (event.key === "Backspace") {
                taskList.removeChild(li);
                document.removeEventListener("keydown", handleKeydown);
            }
            }

            li.addEventListener("mouseenter", () => {
                document.addEventListener("keydown", handleKeydown);
            });

            li.addEventListener("mouseleave", () => {
                document.removeEventListener("keydown", handleKeydown);
            });

            // Make the task draggable
            li.draggable = true;
            li.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', Array.from(taskList.children).indexOf(li));
            });
            li.addEventListener('dragover', (e) => {
                e.preventDefault();
            });
            li.addEventListener('drop', (e) => {
                e.preventDefault();
                const draggedIndex = parseInt(e.dataTransfer.getData('text/plain'));
                const draggedElement = taskList.children[draggedIndex];
                const targetElement = e.target.closest('li');
                if (draggedElement && targetElement && draggedElement !== targetElement) {
                    const targetIndex = Array.from(taskList.children).indexOf(targetElement);
                    if (draggedIndex < targetIndex) {
                        taskList.insertBefore(draggedElement, targetElement.nextSibling);
                    } else {
                        taskList.insertBefore(draggedElement, targetElement);
                    }
                }
            });
        } else {
            alert('Please enter a task!');
        }
    }

    // Add event listener to the "Add" button for click events
    addButton.addEventListener('click', addTask);

    // Add event listener to the input field for the "Enter" key press
