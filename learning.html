<html>

<head>
    <title>Example Page</title>
</head>

<body>

    <h1>Timer</h1>

    <p>Time: <span id="timer-display">00:10</span></p>
    

    <script>
        function startCountdown() {
            let timeInSeconds = 10;
            const display = document.querySelector('#timer-display');

            const countdownInterval = setInterval(() => {
                let minutes = parseInt(timeInSeconds / 60, 10);
                let seconds = parseInt(timeInSeconds % 60, 10);

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;

                if (--timeInSeconds < 0) {
                clearInterval(countdownInterval); // Stop the timer when it reaches zero
                display.textContent = "Time's up!";
                }
                
            }, 1000); // Update every 1 second (1000ms)
        }

    </script>

    <button onclick="startCountdown()">Start Countdown</button>

</body>


</html>
